name: Phonk Reel Test (Step 3 & 4)
 
permissions:
  contents: write

on:
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  render-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15 
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc

      # Optional: Create dummy assets if they don't exist in the repo 
      # so Step 3 doesn't fail immediately.
      - name: 🔍 Ensure Assets Exist
        run: |
          mkdir -p assets/audio assets/image
          # If these files don't exist, Step 3 & 4 will crash.

      - name: 🔪 Step 3 - Split Audio & Image
        run: bash 3_audio_image_splitter.sh

      - name: 🎬 Step 4 - Render Video
        run: |
          rm -rf output/
          mkdir -p output/
          bash 4_output.sh

      - name: 📤 Upload Result for Inspection
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phonk-test-video
          path: output/
