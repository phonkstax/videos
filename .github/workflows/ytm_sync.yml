name: YouTube Music JS Sync

on:
  workflow_dispatch:

jobs:
  ytm-js-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ytmusicapi
        run: npm install ytmusicapi

      - name: Run Script
        env:
          # Make sure these match your GitHub Secrets exactly
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
        run: node get_playlist.js
