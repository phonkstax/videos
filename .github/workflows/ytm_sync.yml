name: Phonkstax Reel Engine
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg jq bc
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Check Notion
        id: check
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python check_and_process.py

      - name: Render Reel
        if: steps.check.outputs.exists == 'false'
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
        run: |
          chmod +x render_reel.sh
          ./render_reel.sh

      - name: Upload
        if: steps.check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.check.outputs.title }}
          path: output.mp4
