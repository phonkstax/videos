name: Phonkstax Reel Engine

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          # We only need requests now
          python3 -m pip install requests --break-system-packages

      - name: Run Check and Download (Cobalt Bridge)
        id: check
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python check_and_process.py

      - name: Execute FFmpeg Rendering
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x render_reel.sh
          ./render_reel.sh

      - name: Save Resulting Reel
        if: steps.check.outputs.exists == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.check.outputs.title }}-reel
          path: output.mp4
