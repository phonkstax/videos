name: PikPak Round-Trip Test

on:
  workflow_dispatch:

jobs:
  full-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rclone
        run: sudo -v && curl https://rclone.org/install.sh | sudo bash

      - name: Configure PikPak
        env:
          PIKPAK_USER: ${{ secrets.PIKPAK_USER }}
          PIKPAK_PASS: ${{ secrets.PIKPAK_PASS }}
        run: |
          rclone config create mypikpak pikpak user "$PIKPAK_USER" pass "$PIKPAK_PASS"
          rclone lsf mypikpak: --max-depth 1

      - name: Run Full Test Script
        run: python pikpak_full_test.py

      - name: Verify Local File
        run: ls -lh # Lists files in the runner to prove the video is there
