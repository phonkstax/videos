name: Phonk Reel Automation

permissions:
  contents: write  # Allows the bot to push to any branch

on:
  workflow_dispatch:

jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Step 1 - Notion & Playlist Check
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          # DEBUG: See what the runner actually sees
          cat 1_Notion_check.py
          
          # RUN:
          python 1_Notion_check.py

      - name: 📝 Commit and Push Metadata (Early Save)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add -f metadata.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to metadata.json"
          else
            git commit -m "Update metadata for new track [skip ci]"
            # DYNAMIC BRANCH PUSH: Works for main, beta, or any other branch
            git push origin ${{ github.ref_name }}
          fi

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          sudo -v && curl https://rclone.org/install.sh | sudo bash

      - name: 📥 Step 2 - Download & Cleanup Assets
        env:
          PIKPAK_USER: ${{ secrets.PIKPAK_USER }}
          PIKPAK_PASS: ${{ secrets.PIKPAK_PASS }}
        run: |
          rclone config create mypikpak pikpak user "$PIKPAK_USER" pass "$PIKPAK_PASS"
          python 2_download_video.py

      - name: 🔪 Step 3 - Split Audio & Image
        run: bash 3_audio_image_splitter.sh

      - name: 🔉 Step 3.5 - Extract Best Part
        run: python 3.5_trim_audio.py

      - name: 🎬 Step 4 - Render Video
        run: |
          rm -rf output/
          mkdir -p output/
          bash 4_output.sh

      - name: 🚀 Step 5 - Webhook & Force Push Video
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: |
          bash 5_webhook.sh

      - name: 📦 Archive Final Video (GitHub Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-reels
          path: output/
