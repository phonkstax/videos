name: Phonk Reel Automation

permissions:
  contents: write
  
on:
  workflow_dispatch:
  push:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
    - cron: '0 6 * * *'
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
jobs:
  render-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # Stop the job if it hangs for more than 30 mins
    
    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Step 1 - Notion & Playlist Check
        env:
          # Existing Secrets
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          # NEW Secrets
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          YT_PLAYLIST_ID: ${{ secrets.YT_PLAYLIST_ID }}
        run: python 1_Notion_check.py
          

      - name: 📝 Commit and Push Metadata (Early Save)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add -f metadata.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to metadata.json"
          else
            git commit -m "Update metadata for new track [skip ci]"
            # DYNAMIC BRANCH PUSH: Works for main, beta, or any other branch
            git push origin ${{ github.ref_name }}
          fi

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq bc
          sudo -v && curl https://rclone.org/install.sh | sudo bash

      - name: 📥 Step 2 - Download & Cleanup Assets
        env:
          PIKPAK_USER: ${{ secrets.PIKPAK_USER }}
          PIKPAK_PASS: ${{ secrets.PIKPAK_PASS }}
        run: |
          rclone config create mypikpak pikpak user "$PIKPAK_USER" pass "$PIKPAK_PASS"
          python 2_download_video.py

      - name: 🔪 Step 3 - Split Audio & Image
        run: bash 3_audio_image_splitter.sh

      - name: 🔉 Step 3.5 - Extract Best Part
        run: python 3.5_trim_audio.py

      - name: 🎬 Step 4 - Render Video
        run: |
          rm -rf output/
          mkdir -p output/
          bash 4_output.sh

      - name: 🚀 Step 5 - Webhook & Force Push Video
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: bash 5_webhook.sh

      - name: 📝 Step 6 - Update Notion Database
        if: success()
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: python 6_notion_update.py

      - name: 🧹 Step 7 - Delete from YouTube Playlist
        if: success()
        env:
          YTM_CLIENT_ID: ${{ secrets.YTM_CLIENT_ID }}
          YTM_CLIENT_SECRET: ${{ secrets.YTM_CLIENT_SECRET }}
          YTM_OAUTH_JSON: ${{ secrets.YTM_OAUTH_JSON }}
        run: python 7_cleanup_playlist.py

      - name: ☁️ Step 8 - Final PikPak Cloud Cleanup
        if: success()
        run: python 8_pikpak_cleanup.py
