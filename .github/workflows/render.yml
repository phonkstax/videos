name: Test Render Only (Step 4)

on:
  workflow_dispatch: # Allows you to click "Run workflow" manually

permissions:
  contents: write

jobs:
  render-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg bc jq

      - name: Verify Assets Exist
        run: |
          echo "🔍 Checking for required files..."
          ls -R ./assets/
          if [ ! -f ./assets/audio/audio.mp3 ]; then echo "❌ Missing audio.mp3"; exit 1; fi
          if [ ! -f ./assets/image/image.jpg ]; then echo "❌ Missing image.jpg"; exit 1; fi
          if [ ! -f ./assets/spotify.png ]; then echo "❌ Missing spotify.png"; exit 1; fi

      - name: Step 3.5 - Extract Best Part
        run: |
          # This script is PYTHON, so we use 'python'
          python 3.5_trim_audio.py

      - name: Step 4 - Render Output
        run: |
          # This script is a BASH script, so we MUST use 'bash'
          # If you use 'python' here, it will crash with a SyntaxError
          bash 4_output.sh
          
      - name: Upload Test Result
        uses: actions/upload-artifact@v4
        with:
          name: phonk-test-video
          path: output/output.mp4
